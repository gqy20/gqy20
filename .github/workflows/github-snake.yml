name: Generate Snake Animation

on:
  # 每天北京时间凌晨3点5分运行（避免与其他工作流冲突）
  schedule:
    - cron: '5 19 * * *'
  # 手动触发
  workflow_dispatch:
  # 推送到main分支时触发
  push:
    branches: [ main ]

# 与其它写 main 的 workflow 串行推送，避免 ref lock 冲突
concurrency:
  group: gqy20-main-write
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Snake Animation

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Generate GitHub Snake Animation
        uses: Platane/snk/svg-only@v3.4.1
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snake svg to main
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p output
          cp dist/*.svg output/
          git add output/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update snake animation" || exit 0
          # 拉取远程更新以避免冲突；push 失败重试一次
          for i in 1 2 3; do
            git fetch origin main && git rebase origin/main || true
            if git push; then break; fi
            echo "::warning::push 失败，$((i)) 次重试中..."
            sleep 5
          done