name: Generate Profile Summary Cards

on:
  # 每天北京时间凌晨3点10分运行（避免与其他工作流冲突）
  schedule:
    - cron: '10 19 * * *'
  # 手动触发
  workflow_dispatch:
  # 推送到main分支时触发
  push:
    branches: [ main ]

# 与其它写 main 的 workflow 串行推送，避免 ref lock 冲突
concurrency:
  group: gqy20-main-write
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate Profile Summary Cards

    steps:
      - uses: actions/checkout@v6.0.1

      - name: Generate Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@v0.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          # 排除私人仓库
          EXCLUDE: "private"
          # 只生成指定主题，减少冗余
          THEME: vue, github, github_dark, tokyonight, dracula
          # 使用UTC时间
          UTC_OFFSET: 8
          # 自动推送更改
          AUTO_PUSH: "false"

      - name: Commit & Push Profile Cards
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile-summary-card-output/*.svg
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update profile summary cards" || exit 0
          # push 失败重试一次（应对其它 workflow 并发推送）
          for i in 1 2 3; do
            git fetch origin main && git rebase origin/main || true
            if git push; then break; fi
            echo "::warning::push 失败，$((i)) 次重试中..."
            sleep 5
          done