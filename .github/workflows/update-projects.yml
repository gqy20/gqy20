name: Update Projects List

on:
  # 每天北京时间凌晨2点运行
  schedule:
    - cron: '0 18 * * *'
  # 手动触发
  workflow_dispatch: {}
  # 当有新push时触发（可选）
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/update-projects.yml'

permissions:
  contents: write

# 防止与其它写 main 的 workflow 并发推送
concurrency:
  group: gqy20-main-write
  cancel-in-progress: false

jobs:
  update-projects:
    runs-on: ubuntu-latest
    name: 更新项目列表

    steps:
      - uses: actions/checkout@v6.0.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get repository list and update README
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;

  
            // 获取用户的所有仓库（使用公开API）
            const repos = await github.rest.repos.listForUser({
              username: owner,
              type: 'owner',
              sort: 'updated',
              direction: 'desc',
              per_page: 100
            });

            // 过滤并处理项目
            const filteredRepos = repos.data
              .filter(r => !r.fork && r.name !== repo)
              .slice(0, 6); // 取6个项目，每行3个

            // 生成每个项目的卡片
            const projectCards = filteredRepos.map(r => {
              const lang = r.language || '';
              // 使用 skillicons 显示技能（移除 theme 参数）
              const icon = lang.toLowerCase();
              const skillIcons = icon ? `<img src="https://skillicons.dev/icons?i=${icon}" alt="${lang}" />` : '';

            const stars = r.stargazers_count || 0;
            // 限制描述长度
            const description = (r.description || `${r.name} 项目`).substring(0, 50) + (r.description && r.description.length > 50 ? '...' : '');

            // 使用 GitHub Shields 徽章代替图片卡片
            const projectCard = '<td align="center" width="50%" style="padding: 15px; border: 1px solid #30363d; border-radius: 6px; margin: 5px; background-color: #0d1117;">' +
                '<h3><a href="' + r.html_url + '" style="color: #58a6ff; text-decoration: none;">' + r.name + '</a></h3>' +
                '<p style="color: #8b949e; font-size: 14px; margin: 10px 0;">' + description + '</p>' +
                '<div style="margin: 10px 0;">' + skillIcons + '</div>' +
                '<div style="margin: 10px 0;">' +
                  '<img src="https://img.shields.io/github/stars/gqy20/' + r.name + '?style=flat-square&logo=github" alt="Stars" /> ' +
                  '<img src="https://img.shields.io/github/forks/gqy20/' + r.name + '?style=flat-square&logo=github" alt="Forks" /> ' +
                  '<img src="https://img.shields.io/github/languages/top/gqy20/' + r.name + '?style=flat-square" alt="Language" />' +
                '</div>' +
                (r.homepage ? '<div style="margin-top: 10px;"><a href="' + r.homepage + '" target="_blank" style="color: #58a6ff;">🏠 查看演示</a></div>' : '') +
                '</td>';

              return projectCard;
            });

            // 将项目分组，每两个一组（更好的移动端显示）
            const projectRows = [];
            for (let i = 0; i < projectCards.length; i += 2) {
              const rowProjects = [
                projectCards[i] || '<td width="50%"></td>',
                projectCards[i + 1] || '<td width="50%"></td>'
              ];
              projectRows.push('<tr>\n' + rowProjects.join('\n') + '\n</tr>');
            }

            const projectsTable = '<table width="100%" style="table-layout: fixed;">\n' + projectRows.join('\n') + '\n</table>';

            // 读取README文件
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');

            // 查找并替换项目部分
            // startMarker 通常稳定；endMarker 因 README 重构可能变更，
            // 用候选列表依次匹配，命中即用。
            const startMarker = '## 🌟 精选项目';
            const endMarkerCandidates = [
              '### 📊 Profile Summary',
              '### 🎯 Profile Summary',
              '## 📊 Profile Summary',
              '## 🎯 Profile Summary'
            ];
            const endMarker = endMarkerCandidates.find(m => readme.includes(m));

            const startIndex = readme.indexOf(startMarker);
            const endIndex = endMarker ? readme.indexOf(endMarker) : -1;

            if (startIndex === -1) {
              console.error('无法找到开始标记: ' + startMarker);
              process.exit(1);
            }
            if (!endMarker || endIndex === -1) {
              console.error('无法找到结束标记。已尝试的候选:');
              endMarkerCandidates.forEach(m => console.error('  - ' + m + '  ->  ' + (readme.includes(m) ? '命中' : '未命中')));
              process.exit(1);
            }

            if (startIndex !== -1 && endIndex !== -1) {
              const beforeProjects = readme.substring(0, startIndex);
              const afterProjects = readme.substring(endIndex);

              // 构建新的项目部分
              const projectsSection = startMarker + '\n\n' +
                '<!-- 此部分由GitHub Actions自动更新，请勿手动编辑 -->\n' +
                '<!-- 上次更新时间: ' + new Date().toLocaleString('zh-CN') + ' -->\n\n' +
                projectsTable + '\n\n';

              // 写入新内容
              const newReadme = beforeProjects + projectsSection + afterProjects;
              fs.writeFileSync('README.md', newReadme);

              console.log('成功更新了 ' + filteredRepos.length + ' 个项目的信息');
            } else {
              console.error('无法找到项目部分的标记');
              process.exit(1);
            }

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          # 只有当有变更时才提交
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            # 先 fetch 后 rebase，避免 ref lock 冲突；失败再重试一次
            git fetch origin main
            if ! git rebase origin/main; then
              echo "::warning::rebase 冲突，回退到 merge"
              git rebase --abort || true
              git merge --no-edit -X ours origin/main || true
            fi
            git commit -m "自动同步项目信息"
            # push 失败重试一次（应对并发推送）
            for i in 1 2 3; do
              if git push; then break; fi
              echo "::warning::push 失败，$((i)) 次重试中..."
              sleep 5
              git fetch origin main && git rebase origin/main || true
            done
          fi